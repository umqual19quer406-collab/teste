name: Tests

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run default test suite
        run: pytest -q

  integration-db-tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_PID: Developer
          MSSQL_SA_PASSWORD: ${{ secrets.CI_SQLSERVER_SA_PASSWORD != '' && secrets.CI_SQLSERVER_SA_PASSWORD || 'Strong_Passw0rd!123' }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd "bash -c '</dev/tcp/localhost/1433'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 20s
    env:
      CI_SQLSERVER_SA_PASSWORD: ${{ secrets.CI_SQLSERVER_SA_PASSWORD != '' && secrets.CI_SQLSERVER_SA_PASSWORD || 'Strong_Passw0rd!123' }}
      TEST_DB_ADMIN_CONN_STR: DRIVER={ODBC Driver 18 for SQL Server};SERVER=127.0.0.1,1433;DATABASE=master;UID=sa;PWD=${{ secrets.CI_SQLSERVER_SA_PASSWORD != '' && secrets.CI_SQLSERVER_SA_PASSWORD || 'Strong_Passw0rd!123' }};Encrypt=no;TrustServerCertificate=yes;
      TEST_DB_CONN_STR: DRIVER={ODBC Driver 18 for SQL Server};SERVER=127.0.0.1,1433;DATABASE=mini_protheus_ci;UID=sa;PWD=${{ secrets.CI_SQLSERVER_SA_PASSWORD != '' && secrets.CI_SQLSERVER_SA_PASSWORD || 'Strong_Passw0rd!123' }};Encrypt=no;TrustServerCertificate=yes;
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ODBC Driver 18
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg unixodbc unixodbc-dev
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo env ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -c "import pyodbc; print(pyodbc.drivers())"

      - name: Wait for SQL Server
        run: |
          python - <<'PY'
          import os
          import time
          import pyodbc

          conn_str = os.environ["TEST_DB_ADMIN_CONN_STR"]
          last_error = None

          for attempt in range(1, 91):
              try:
                  conn = pyodbc.connect(conn_str, timeout=5, autocommit=True)
                  conn.close()
                  print(f"SQL Server ready on attempt {attempt}")
                  break
              except Exception as exc:
                  last_error = exc
                  print(f"Waiting for SQL Server... attempt {attempt}/90: {exc}")
                  time.sleep(2)
          else:
              raise SystemExit(f"SQL Server did not become ready: {last_error}")
          PY

      - name: Initialize integration database
        run: python tests/init_integration_db.py

      - name: Run DB-backed business tests
        run: pytest -q tests/test_business_flows_db.py

      - name: Diagnostics on failure
        if: failure()
        run: |
          docker ps -a
          SQL_ID=$(docker ps -aq --filter ancestor=mcr.microsoft.com/mssql/server:2022-latest | head -n 1)
          if [ -n "$SQL_ID" ]; then
            docker logs "$SQL_ID" || true
          fi
